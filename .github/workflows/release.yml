name: Create Version PR

on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  version-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump package versions
        run: pnpm --filter './packages/**' -r exec npm pkg set version=${{ steps.version.outputs.VERSION }}

      - name: Update CHANGELOG
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION;
            const body = process.env.RELEASE_BODY || '';
            const date = new Date().toISOString().split('T')[0];
            const entry = '## v' + version + ' (' + date + ')\n\n' + body + '\n';

            let content = '';
            if (fs.existsSync('CHANGELOG.md')) {
              content = fs.readFileSync('CHANGELOG.md', 'utf8');
              const firstHeading = content.indexOf('## ');
              if (firstHeading !== -1) {
                content = content.slice(0, firstHeading) + entry + '\n' + content.slice(firstHeading);
              } else {
                content += '\n' + entry;
              }
            } else {
              content = '# Changelog\n\n' + entry;
            }

            fs.writeFileSync('CHANGELOG.md', content);
          "

      - name: Validate release
        id: validate
        run: |
          pnpm build
          pnpm lint
          pnpm test

      - name: Delete failed release and tag
        if: ${{ failure() && github.event_name == 'release' && steps.validate.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release delete "$TAG_NAME" --cleanup-tag --yes

      - name: Determine labels
        id: labels
        run: |
          if [[ "$GITHUB_REF_NAME" == *"beta"* ]]; then
            echo "LABELS=release,beta" >> "$GITHUB_OUTPUT"
          else
            echo "LABELS=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: release/v${{ steps.version.outputs.VERSION }}
          title: "chore: release v${{ steps.version.outputs.VERSION }}"
          commit-message: "chore: release v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Release v${{ steps.version.outputs.VERSION }}

            This PR was automatically created by the release workflow.

            ### Changes
            ${{ github.event.release.body }}

            ---
            Merging this PR will trigger npm publish.
          labels: ${{ steps.labels.outputs.LABELS }}
